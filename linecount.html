<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Line Counter — Chefly</title>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--panel2:#273548;--line:#334155;--txt:#f1f5f9;--muted:#94a3b8;--accent:#f97316;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:16px;display:flex;flex-direction:column;gap:14px;max-width:560px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:22px}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .clock{font-size:16px;color:var(--muted);font-variant-numeric:tabular-nums}
  .rate{background:var(--panel);border:2px solid var(--line);border-radius:20px;padding:18px;text-align:center}
  .rate .n{font-size:74px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
  .rate .l{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px}
  .rate.good{border-color:var(--green)} .rate.warn{border-color:var(--amber)} .rate.bad{border-color:var(--red)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .stat .n{font-size:26px;font-weight:900}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .big{background:var(--accent);color:#0b1220;border:none;border-radius:24px;font-size:44px;font-weight:900;padding:38px 10px;cursor:pointer;width:100%;letter-spacing:1px}
  .big:active{transform:scale(.98)}
  .row{display:flex;gap:10px}
  .alt{flex:1;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:16px;font-size:22px;font-weight:800;padding:16px 6px;cursor:pointer}
  .undo{flex:1;background:transparent;color:#fca5a5;border:1px solid rgba(239,68,68,.4);border-radius:16px;font-size:15px;font-weight:700;padding:12px;cursor:pointer}
  .log{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
  .log h2{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:15px;font-variant-numeric:tabular-nums}
  .err{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.4);padding:16px;border-radius:12px;text-align:center}
  .flash{position:fixed;inset:0;background:rgba(34,197,94,.35);pointer-events:none;opacity:0;transition:opacity .5s}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<header><div class="brand"><span class="dot"></span> Line Counter</div><div class="clock" id="clock"></div></header>
<div class="err" id="err" style="display:none"></div>
<div class="rate" id="rateCard"><div class="n" id="rate">–</div><div class="l" id="rateL">trays / hour · target –</div></div>
<div class="grid">
  <div class="stat"><div class="n" id="total">0</div><div class="l">Trays today</div></div>
  <div class="stat"><div class="n" id="lastHour">0</div><div class="l">Last 60 min</div></div>
  <div class="stat"><div class="n" id="since">–</div><div class="l">Running since</div></div>
</div>
<button class="big" onclick="add(100)">+100 TRAYS</button>
<div class="row">
  <button class="alt" onclick="add(50)">+50</button>
  <button class="alt" onclick="add(200)">+200</button>
  <button class="alt" onclick="addCustom()">Other…</button>
</div>
<div class="row"><button class="undo" onclick="undo()">↩ Undo last tap</button></div>
<div class="log"><h2>Today's checkpoints</h2><div id="log"><div class="li" style="border:none;color:var(--muted)">No taps yet — tap +100 when the first hundred sealed trays are done.</div></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient('https://fhztszxpgqhunogwcoxw.supabase.co','sb_publishable_3g-avL7NqQQsIMESfiGk4Q_8dBIarve')
const token = new URLSearchParams(location.search).get('t') || ''
const $=id=>document.getElementById(id)
let busy=false
function showErr(m){ $('err').style.display='block'; $('err').textContent=m }
function fmtT(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') }
function render(s){
  $('err').style.display='none'
  $('total').textContent=s.total||0
  $('lastHour').textContent=s.last_hour||0
  $('since').textContent=s.first_ts?fmtT(s.first_ts):'–'
  const r=s.rate_overall
  $('rate').textContent=r!=null?r:'–'
  $('rateL').textContent='trays / hour · target '+(s.target||500)
  const card=$('rateCard'); card.className='rate'+(r==null?'':(r>=(s.target||500)*0.8?' good':(r>=(s.target||500)*0.6?' warn':' bad')))
  const rec=s.recent||[]
  $('log').innerHTML=rec.length?rec.map(x=>'<div class="li"><span>'+fmtT(x.ts)+(x.by?' · '+x.by:'')+'</span><b>+'+x.trays+'</b></div>').join(''):'<div class="li" style="border:none;color:var(--muted)">No taps yet — tap +100 when the first hundred sealed trays are done.</div>'
}
async function call(action,trays){
  if(!token){showErr('Missing token — open this page from the link in Manage (same t= as the wall links).');return}
  if(busy)return; busy=true
  const {data,error}=await sb.rpc('sim_public_linecount',{p_token:token,p_action:action,p_trays:trays??null,p_by:localStorage.getItem('lc_name')||null})
  busy=false
  if(error){showErr(error.message);return}
  render(data)
}
window.add=async n=>{ await call('add',n); const f=$('flash'); f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',250);
  if(navigator.vibrate)navigator.vibrate(60) }
window.addCustom=async()=>{ const v=prompt('How many trays since the last tap?'); if(v===null)return
  const n=Math.round(Number(v)); if(!n||n<1){alert('Enter a number of trays.');return} await window.add(n) }
window.undo=async()=>{ if(confirm('Remove the most recent tap?')) await call('undo') }
if(!localStorage.getItem('lc_name')){ const nm=prompt('Your name (shown next to your taps, asked once):'); if(nm)localStorage.setItem('lc_name',nm.trim()) }
function tickClock(){ $('clock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }
tickClock(); setInterval(tickClock,10000)
call('state'); setInterval(()=>call('state'),20000)
</script>
</body>
</html>
