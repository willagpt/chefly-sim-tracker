<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIM Wall — Chefly</title>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--panel2:#273548;--line:#334155;--txt:#f1f5f9;--muted:#94a3b8;--accent:#f97316;--green:#22c55e;--blue:#3b82f6;--amber:#f59e0b;--red:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:24px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:14px;font-weight:900;font-size:30px;letter-spacing:.5px}
  .dot{width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px var(--accent)}
  .clock{font-size:22px;color:var(--muted);font-variant-numeric:tabular-nums}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;text-align:center}
  .stat .n{font-size:64px;font-weight:900;line-height:1}
  .stat .l{font-size:18px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:1px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
  .panel h2{font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .live{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;background:var(--panel2)}
  .row.over{border-color:var(--red);background:rgba(239,68,68,.12)}
  .row .name{font-size:24px;font-weight:800}
  .row .sub{font-size:17px;color:var(--muted);margin-top:4px}
  .badge{font-size:20px;font-weight:800;padding:6px 14px;border-radius:999px;white-space:nowrap}
  .badge.run{background:rgba(34,197,94,.18);color:#86efac}
  .badge.good{background:rgba(34,197,94,.18);color:#86efac}
  .badge.low{background:rgba(245,158,11,.18);color:#fcd34d}
  .badge.over{background:rgba(239,68,68,.2);color:#fca5a5}
  .empty{color:var(--muted);font-size:20px;padding:18px}
  .err{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.4);padding:24px;border-radius:16px;font-size:20px;max-width:760px;margin:60px auto;text-align:center}
  @media(max-width:900px){.cols{grid-template-columns:1fr}.stat .n{font-size:48px}}
</style>
</head>
<body>
<div id="root"><div class="err" id="err" style="display:none"></div><div id="content" style="display:none">
  <header>
    <div class="brand"><span class="dot"></span> SIM Live — Chefly</div>
    <div class="clock" id="clock"></div>
  </header>
  <div class="stat-grid">
    <div class="stat"><div class="n" id="stRun">0</div><div class="l">On task now</div></div>
    <div class="stat"><div class="n" id="stDone">0</div><div class="l">Completed today</div></div>
    <div class="stat"><div class="n" id="stKg">0</div><div class="l">Kg today</div></div>
  </div>
  <div class="panel" style="margin-bottom:18px"><h2>🔥 In the vessels</h2><div id="vessels"></div></div>
  <div class="cols">
    <div class="panel"><h2><span class="live"></span> Running now</h2><div id="running"></div></div>
    <div class="panel"><h2>Just finished</h2><div id="done"></div></div>
  </div>
</div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient('https://fhztszxpgqhunogwcoxw.supabase.co','sb_publishable_3g-avL7NqQQsIMESfiGk4Q_8dBIarve')
const token = new URLSearchParams(location.search).get('t') || ''
const $=id=>document.getElementById(id)
function esc(v){if(v==null)return '';return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
const fmtTime=t=>new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
const elapsedMin=t=>Math.floor((Date.now()-new Date(t))/60000)

function showErr(m){ $('err').style.display='block'; $('err').textContent=m; $('content').style.display='none' }

async function refresh(){
  if(!token){ showErr('Missing access token. Open the wall URL from Manage → Wall display.'); return }
  const {data,error}=await sb.rpc('sim_public_dashboard',{p_token:token})
  if(error){ showErr('Could not load (check the wall link / token). '+error.message); return }
  $('err').style.display='none'; $('content').style.display='block'
  $('stRun').textContent=data.stats.inprogress
  $('stDone').textContent=data.stats.done
  $('stKg').textContent=data.stats.kg
  const rb=$('running')
  if(!data.running.length){ rb.innerHTML='<div class="empty">Nobody is on a task right now.</div>' }
  else rb.innerHTML=data.running.map(r=>`<div class="row"><div><div class="name">${esc(r.who)}</div><div class="sub">${esc(r.task)}${r.product?' · '+esc(r.product):''} · ${r.staff||1} ppl</div></div>${r.paused?'<div class="badge low">❚❚ paused</div>':'<div class="badge run">● '+elapsedMin(r.start_time)+' min</div>'}</div>`).join('')
  const db=$('done')
  if(!data.done.length){ db.innerHTML='<div class="empty">No completed tasks yet today.</div>' }
  else db.innerHTML=data.done.slice(0,8).map(d=>{const _u=d.uom||'kg';const pct=d.pct!=null?`<div class="badge ${d.pct>=100?'good':'low'}">${d.pct}%</div>`:'';return `<div class="row"><div><div class="name">${esc(d.who)}</div><div class="sub">${esc(d.task)} · ${d.units??'–'} ${_u} · ${d.minutes??'–'} min${d.uph?' · '+d.uph+' '+_u+'/hr':''}${d.waste?' · '+d.waste+' '+_u+' waste':''} · ${fmtTime(d.finish_time)}</div></div>${pct}</div>`}).join('')
  refreshEquip()
}
async function refreshEquip(){
  try{
    const {data,error}=await sb.rpc('sim_public_equipment',{p_token:token})
    if(error||!data) return
    const busy=(data.vessels||[]).filter(v=>v.busy)
    const box=$('vessels')
    if(!busy.length){ box.innerHTML='<div class="empty">Nothing cooking right now.</div>'; return }
    box.innerHTML=busy.map(v=>{
      let badge='', over=false
      if(v.due_at){
        const rem=new Date(v.due_at)-Date.now()
        if(rem<0){ over=true; badge='<div class="badge over">⏰ OVERDUE '+Math.floor(-rem/60000)+'m</div>' }
        else badge='<div class="badge good">due in '+Math.ceil(rem/60000)+'m</div>'
      } else badge='<div class="badge run">'+elapsedMin(v.start_time)+'m</div>'
      return `<div class="row${over?' over':''}"><div><div class="name">${esc(v.name)}</div><div class="sub">${esc(v.product)||'In use'}${v.who?' · '+esc(v.who):''} · in for ${elapsedMin(v.start_time)} min</div></div>${badge}</div>`
    }).join('')
  }catch(e){}
}
function tick(){ $('clock').textContent=new Date().toLocaleString([], {weekday:'short', hour:'2-digit', minute:'2-digit'}) }
tick(); setInterval(tick,1000)
refresh(); setInterval(refresh, 15000)
</script>
</body>
</html>
